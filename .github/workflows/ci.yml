name: Mobile CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'refactor/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18.x'
  JAVA_VERSION: '17'
  XCODE_VERSION: '15.0'

jobs:
  # iOS Build and Test
  ios-build:
    name: iOS Build & Test
    runs-on: macos-13
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Run SwiftLint
        run: |
          if which swiftlint >/dev/null; then
            swiftlint lint --strict --reporter github-actions-logging
          else
            echo "SwiftLint not installed, skipping..."
          fi

      - name: Build iOS app
        run: |
          xcodebuild clean build \
            -workspace ios/App.xcworkspace \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Run XCTest unit tests
        run: |
          xcodebuild test \
            -workspace ios/App.xcworkspace \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report html --output ios-test-report.html

      - name: Generate code coverage report
        run: |
          xcrun llvm-cov export \
            -format="lcov" \
            -instr-profile=$(find ~/Library/Developer/Xcode/DerivedData -name "*.profdata") \
            $(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)/App \
            > ios-coverage.lcov

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(lcov --summary ios-coverage.lcov 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"

      - name: Upload iOS test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ios-test-results
          path: ios-test-report.html

      - name: Upload iOS coverage
        uses: codecov/codecov-action@v3
        with:
          files: ios-coverage.lcov
          flags: ios
          name: ios-coverage

  # Android Build and Test
  android-build:
    name: Android Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Run ktlint
        run: |
          cd android
          ./gradlew ktlintCheck --stacktrace

      - name: Build Android app (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Run JUnit unit tests
        run: |
          cd android
          ./gradlew testDebugUnitTest --stacktrace

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: cd android && ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Generate JaCoCo coverage report
        run: |
          cd android
          ./gradlew jacocoTestReport

      - name: Check coverage threshold (70%)
        run: |
          cd android
          ./gradlew jacocoTestCoverageVerification

      - name: Upload Android test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: android-test-results
          path: android/app/build/reports/tests/testDebugUnitTest/

      - name: Upload Android coverage
        uses: codecov/codecov-action@v3
        with:
          files: android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android-coverage

      - name: Check app size
        run: |
          APK_SIZE=$(stat -c%s android/app/build/outputs/apk/debug/app-debug.apk)
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "APK Size: ${APK_SIZE_MB}MB"
          if [ $APK_SIZE_MB -gt 50 ]; then
            echo "Warning: APK size exceeds 50MB threshold"
          fi

  # React Native Tests
  react-native:
    name: React Native Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run Jest tests
        run: npm test -- --coverage --maxWorkers=2

      - name: Check test coverage (70%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"

      - name: Upload JS coverage
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.info
          flags: javascript
          name: react-native-coverage

      - name: Bundle size analysis
        run: |
          npm run build:analyze || true
          if [ -f bundle-analysis.json ]; then
            BUNDLE_SIZE=$(jq '.totalSize' bundle-analysis.json)
            echo "Bundle size: ${BUNDLE_SIZE} bytes"
          fi

  # Performance Testing
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [android-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v3
        with:
          name: android-test-results

      - name: Measure app launch time
        run: |
          echo "App launch time performance metrics would be collected here"
          echo "Using tools like: Firebase Performance Monitoring, Android Vitals, etc."

      - name: Check memory usage
        run: |
          echo "Memory profiling would be performed here"
          echo "Target: < 200MB for typical usage scenarios"

  # UI Tests
  ui-tests:
    name: UI Tests (Critical Flows)
    runs-on: macos-13
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install dependencies
        run: |
          cd ios
          pod install

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -workspace ios/App.xcworkspace \
            -scheme AppUITests \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ui-test-results
          path: ios/build/Logs/Test/*.xcresult

  # Security Checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
