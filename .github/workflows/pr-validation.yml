name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - production

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check branch naming
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|chore|docs|refactor)/ ]]; then
            echo "❌ Branch name must start with: feature/, fix/, chore/, docs/, or refactor/"
            exit 1
          fi
          echo "✅ Branch naming valid"

      - name: Check commit message format
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ ! "$COMMIT_MSG" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?:.+ ]]; then
            echo "❌ Commit message must follow conventional commits format"
            exit 1
          fi
          echo "✅ Commit message format valid"

      - name: Summary
        run: |
          echo "✅ All validation checks passed"
